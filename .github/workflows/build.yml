name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4.4.1

      - name: Build
        run: ./gradlew build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
            build/reports/checkstyle/
            build/reports/pmd/

      - name: Check for code changes
        id: changes
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          BEFORE="$GIT_BEFORE"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD)
          fi
          if git diff --name-only "$BEFORE".."$GIT_SHA" | grep -qvE '\.md$'; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GIT_BEFORE: ${{ github.event.before }}
          GIT_SHA: ${{ github.sha }}

      - name: Tag release
        id: tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.changes.outputs.code_changed == 'true'
        run: |
          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          ./gradlew release -Prelease.disableChecks
          TAG=$(git describe --tags --abbrev=0)
          if [ "$TAG" = "$BEFORE_TAG" ]; then
            echo "::error::release plugin did not create a new tag (still at $TAG)"
            exit 1
          fi
          echo "Tagged: $TAG"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag
        if: steps.tag.outputs.tag_name
        run: git push origin "$TAG_NAME"
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
