name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4.4.1

      - name: Build
        run: ./gradlew build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
            build/reports/checkstyle/
            build/reports/pmd/

      - name: Check for code changes
        id: changes
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if git diff --name-only HEAD~1..HEAD | grep -qvE '\.md$'; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release
        id: tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.changes.outputs.code_changed == 'true'
        run: |
          ./gradlew release -Prelease.disableChecks
          TAG=$(git describe --tags --abbrev=0)
          echo "Tagged: $TAG"
          [ -n "$TAG" ] || { echo "::error::Tag capture failed"; exit 1; }
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build uber-jar
        if: steps.tag.outputs.tag_name
        run: ./gradlew quarkusBuild -Dquarkus.package.jar.type=uber-jar -x test

      - name: Create GitHub release
        if: steps.tag.outputs.tag_name
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          files: build/ec2pf-*-runner.jar
